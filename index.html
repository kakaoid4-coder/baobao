        const teamColorMap = {
            "자립생활팀": { bg: "bg-emerald-100", text: "text-emerald-800", border: "border-emerald-500", dot: "bg-emerald-500" },
            "우리동네사례관리팀": { bg: "bg-amber-100", text: "text-amber-800", border: "border-amber-500", dot: "bg-amber-500" },
            "평생교육팀": { bg: "bg-violet-100", text: "text-violet-800", border: "border-violet-500", dot: "bg-violet-500" },
            "경영지원팀": { bg: "bg-rose-100", text: "text-rose-800", border: "border-rose-500", dot: "bg-rose-500" },
            "default": { bg: "bg-slate-100", text: "text-slate-800", border: "border-slate-500", dot: "bg-slate-500" }
        };

        let viewMode = 'monthly';
        let currentDate = new Date(2026, 3, 1); // 4월부터 데이터 시작
        let filterName = 'all';

        // Process data into a flat list of events
        const events = [];
        const participantNames = new Set();
        rawData.forEach(person => {
            const team = person["해당하는 팀을 선택해주십시오.(*)"];
            const name = person["이름을 입력하여주십시오."];
            participantNames.add(name);
            const colors = teamColorMap[team] || teamColorMap.default;
            
            Object.keys(person).forEach(key => {
                if (key.includes('①') || key.includes('②') || key.includes('③')) {
                    const dateValue = person[key];
                    if (dateValue && dateValue.trim() !== "") {
                        const [dateStr, timeStr] = dateValue.split(' ');
                        events.push({
                            id: `${name}-${key}-${dateValue}`,
                            title: key.split(' (')[0],
                            fullTitle: key,
                            date: dateStr,
                            time: timeStr,
                            name,
                            team,
                            colors
                        });
                    }
                }
            });
        });

        // Initialize UI
        function init() {
            // Fill filter dropdown
            const filterSelect = document.getElementById('filterName');
            Array.from(participantNames).sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                filterSelect.appendChild(opt);
            });

            // Fill legend
            const legendBox = document.getElementById('teamLegend');
            Object.keys(teamColorMap).filter(t => t !== 'default').forEach(team => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full border border-slate-100 bg-slate-50/50';
                item.innerHTML = `<div class="w-3 h-3 rounded-full ${teamColorMap[team].dot}"></div><span class="text-xs font-bold text-slate-700">${team}</span>`;
                legendBox.appendChild(item);
            });

            render();
        }

        function render() {
            if (viewMode === 'monthly') {
                document.getElementById('monthlyView').classList.remove('hidden');
                document.getElementById('yearlyView').classList.add('hidden');
                renderMonthly();
            } else {
                document.getElementById('monthlyView').classList.add('hidden');
                document.getElementById('yearlyView').classList.remove('hidden');
                renderYearly();
            }
        }

        function renderMonthly() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('displayYear').textContent = year;
            document.getElementById('displayMonth').textContent = (month + 1) + '월';

            const filtered = filterName === 'all' ? events : events.filter(e => e.name === filterName);
            
            // Grid calculation
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Padding
            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div');
                div.className = "h-28 bg-slate-50/50 border border-slate-100";
                grid.appendChild(div);
            }

            // Days
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayEvents = filtered.filter(e => e.date === dateKey);
                
                const div = document.createElement('div');
                div.className = `h-28 border border-slate-100 p-1 overflow-y-auto hover:bg-slate-50 transition-colors ${dayEvents.length > 0 ? 'bg-white' : 'bg-slate-50/20'}`;
                
                let eventsHtml = `<div class="text-right text-xs font-bold text-slate-400 mb-1 pr-1">${d}</div>`;
                eventsHtml += '<div class="flex flex-col gap-1">';
                dayEvents.forEach(ev => {
                    eventsHtml += `
                        <div class="text-[9px] leading-tight p-1 rounded ${ev.colors.bg} ${ev.colors.text} border-l-2 ${ev.colors.border} truncate" title="${ev.name} [${ev.time}] ${ev.title}">
                            <span class="font-bold">${ev.time}</span> ${ev.name}
                        </div>
                    `;
                });
                eventsHtml += '</div>';
                
                div.innerHTML = eventsHtml;
                grid.appendChild(div);
            }

            // List rendering
            const listContainer = document.getElementById('monthlyList');
            listContainer.innerHTML = '';
            const monthlyEvents = filtered.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() === month && d.getFullYear() === year;
            }).sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

            document.getElementById('monthlyCount').textContent = `총 ${monthlyEvents.length}건`;

            monthlyEvents.forEach(e => {
                const card = document.createElement('div');
                card.className = "group flex items-center gap-4 p-4 bg-white border border-slate-100 rounded-2xl hover:border-slate-300 transition-all hover:shadow-md";
                card.innerHTML = `
                    <div class="flex flex-col items-center justify-center bg-slate-50 px-3 py-2 rounded-xl min-w-[70px]">
                        <span class="text-[10px] font-black text-slate-400">${e.date.split('-')[2]}일</span>
                        <span class="text-xs font-black text-slate-800">${e.time}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-black text-slate-400 mb-0.5 truncate">${e.fullTitle.split(' (')[0]}</p>
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-bold text-slate-700">${e.name}</span>
                            <span class="px-2 py-0.5 ${e.colors.bg} ${e.colors.text} text-[9px] font-black rounded-md">${e.team}</span>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function renderYearly() {
            const grid = document.getElementById('yearlyGrid');
            grid.innerHTML = '';
            const filtered = filterName === 'all' ? events : events.filter(e => e.name === filterName);

            for (let m = 0; m < 12; m++) {
                const daysInMonth = new Date(2026, m + 1, 0).getDate();
                const firstDay = new Date(2026, m, 1).getDay();
                const monthEvents = filtered.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === m && d.getFullYear() === 2026;
                });
                const eventDays = new Set(monthEvents.map(e => e.date));

                const monthDiv = document.createElement('div');
                monthDiv.className = "bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-all";
                
                let html = `
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-black text-slate-700">${m + 1}월</h3>
                        <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-bold">${eventDays.size}일 교육</span>
                    </div>
                    <div class="grid grid-cols-7 gap-1">
                        ${['일', '월', '화', '수', '목', '금', '토'].map(d => `<div class="text-[8px] text-center text-slate-300 font-bold">${d}</div>`).join('')}
                        ${Array(firstDay).fill('<div class="h-4"></div>').join('')}
                `;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateKey = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayEvents = monthEvents.filter(e => e.date === dateKey);
                    const hasEvents = dayEvents.length > 0;
                    const mainColor = hasEvents ? dayEvents[0].colors.dot : '';
                    
                    html += `
                        <div class="h-4 w-4 mx-auto text-[9px] flex items-center justify-center rounded-full transition-all
                            ${hasEvents ? `${mainColor} text-white font-bold ring-2 ring-white` : 'text-slate-300'}">
                            ${d}
                        </div>
                    `;
                }

                html += '</div>';
                monthDiv.innerHTML = html;
                grid.appendChild(monthDiv);
            }
        }

        // Event Handlers
        function changeView(mode) {
            viewMode = mode;
            const btnMonthly = document.getElementById('btnMonthly');
            const btnYearly = document.getElementById('btnYearly');
            
            if (mode === 'monthly') {
                btnMonthly.className = "flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-bold transition-all bg-slate-800 text-white shadow-md";
                btnYearly.className = "flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:bg-slate-50";
            } else {
                btnYearly.className = "flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-bold transition-all bg-slate-800 text-white shadow-md";
                btnMonthly.className = "flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:bg-slate-50";
            }
            render();
        }

        function updateFilter(val) {
            filterName = val;
            render();
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            render();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            render();
        }

        // Run
        window.onload = init;
    </script>
