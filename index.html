    function convertGoogleDriveLink(url) {
      if (!url) return '';
      const fileIdMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
      if (fileIdMatch && fileIdMatch[1]) {
        return `https://drive.google.com/thumbnail?id=${fileIdMatch[1]}&sz=w800`;
      }
      return url;
    }

                  </a>
                  <div class="space-y-1 mb-2.5">
                    <h2 class="text-3xl font-extrabold text-white flex items-center justify-center gap-2">이름: ${item['이름']} <span class="text-sm font-medium text-brand-400">(연령: ${item['연령']}세)</span></h2>
                    <p class="text-sm text-brand-300 font-medium tracking-wide">거주지역 : 순창군 <span class="text-blue-400 font-bold">${item['읍, 면']}</span></p>
                  </div>
                  <div class="flex flex-wrap gap-1.5 justify-center max-w-md">
                    <span class="text-xs font-semibold px-2.5 py-1 rounded-md border ${genderColor} flex items-center gap-1 shadow-sm">${item['성별'] === '남' ? '♂️ 남성' : '♀️ 여성'}</span>
                    <span class="text-xs font-semibold px-2.5 py-1 rounded-md border bg-slate-800/80 text-brand-200 border-brand-700 shadow-sm">♿ ${item['장애명']} 장애</span>
                    <span class="text-xs font-semibold px-2.5 py-1 rounded-md border ${severityBadgeClass} flex items-center gap-1 shadow-sm">${severityIcon} ${item['장애정도']}</span>
                    <span class="text-xs font-semibold px-2.5 py-1 rounded-md border ${welfareBadgeClass} shadow-sm">🏷️ 수급구분: ${item['수급']}</span>
                  </div>
                </div>
                <div class="bg-brand-950/50 border border-brand-800/80 rounded-xl p-3 mt-2 space-y-1 text-xs text-brand-300">
                  <div class="flex justify-between"><span>중복장애 여부</span><span class="font-medium text-slate-100">${item['중복장애'] || '없음'}</span></div>
                  <div class="flex justify-between"><span>최초 접수 상담자</span><span class="font-medium text-slate-100">${item['최초 접수자']}</span></div>
                </div>
              </div>
              <div class="w-full md:w-[45%] flex flex-col h-full overflow-hidden justify-between mt-6 md:mt-0">
                <div class="flex-1 flex flex-col mb-4 overflow-hidden min-h-[200px]">
                  <div class="flex items-center space-x-2 text-brand-300 text-sm font-bold mb-2 tracking-wider">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    <span>1. 상세 상담 및 관찰내용</span>
                  </div>
                  <div class="flex-1 bg-brand-950/60 border border-brand-800/50 rounded-xl p-4 md:p-5 overflow-y-auto custom-scrollbar text-slate-200 text-base leading-relaxed whitespace-pre-wrap font-normal">${parsed.info}</div>
                </div>
                <div class="h-1/3 min-h-[140px] flex flex-col">
                  <div class="flex items-center space-x-2 text-amber-300 text-sm font-bold mb-2 tracking-wider">
                    <svg class="w-5 h-5 text-amber-400 animate-pulse" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                    <span>2. 핵심 당사자 욕구 & 연계 조치</span>
                  </div>
                  <div class="flex-1 bg-gradient-to-r from-amber-950/40 to-brand-950/80 border border-amber-900/40 rounded-xl p-4 overflow-y-auto custom-scrollbar text-amber-200 text-base leading-relaxed font-semibold">${parsed.desire}</div>
                </div>
              </div>
            </div>
          </div>
        `;
        slideContainer.innerHTML += slideHtml;
      });

      // 3. Swiper 초기화
      const totalSlides = rawData.length + 1;
      document.getElementById('totalNumber').innerText = totalSlides;

      const swiper = new Swiper(".mySwiper", {
        direction: "horizontal",
        loop: false,
        grabCursor: true,
        keyboard: { enabled: true, onlyInViewport: true },
        speed: 500,
        effect: "slide",
        observer: true,
        observeParents: true,
      });

      function updateNavigation() {
        const activeIdx = swiper.activeIndex + 1;
        document.getElementById('currentNumber').innerText = activeIdx;
        document.getElementById('prevBtn').disabled = swiper.isBeginning;
        document.getElementById('nextBtn').disabled = swiper.isEnd;
      }

      swiper.on("slideChange", updateNavigation);
      updateNavigation();

      document.getElementById('prevBtn').addEventListener('click', () => swiper.slidePrev());
      document.getElementById('nextBtn').addEventListener('click', () => swiper.slideNext());
    });
  </script>
</body>
</html>
